<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WMS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f5;color:#1a1a1a}
.nav{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-title{font-size:16px;font-weight:600}
.nav-badge{font-size:11px;background:#e8f4fd;color:#1a6fa8;padding:3px 10px;border-radius:20px}
.nav-status{margin-left:auto;font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
.tabs{display:flex;gap:4px;padding:16px 20px 0}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;cursor:pointer;border:1px solid transparent;background:transparent;color:#666}
.tab.active{background:#fff;border-color:#e5e5e5;border-bottom-color:#fff;color:#1a1a1a;font-weight:500}
.content{background:#fff;border:1px solid #e5e5e5;border-radius:0 8px 8px 8px;margin:0 20px;padding:20px}
.page{display:none}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.metric{background:#f8f8f8;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:600;color:#1a1a1a}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px}
.section{background:#f8f8f8;border-radius:10px;padding:16px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;margin-bottom:12px;color:#444}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:12px;color:#555;width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{font-size:12px;color:#888;width:40px;text-align:right;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#666;font-weight:500}
input,select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff}
input:focus,select:focus{outline:none;border-color:#378ADD}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:#378ADD;color:#fff}
.btn-primary:hover{background:#2a6fb5}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.btn-sm{padding:5px 12px;font-size:12px}
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-row input,.search-row select{flex:1;min-width:140px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f8f8f8;padding:9px 10px;text-align:left;font-weight:600;font-size:11px;color:#888;text-transform:uppercase;border-bottom:1px solid #e5e5e5}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:hover{background:#fafafa}
td{padding:9px 10px;color:#1a1a1a}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-dg{background:#e8f4fd;color:#1a6fa8}
.badge-lg{background:#e8fdf0;color:#166534}
.badge-sg{background:#fef9e8;color:#92400e}
.badge-th{background:#fdf2f8;color:#9d174d}
.badge-ss{background:#f5f5f5;color:#666}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.alert-success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.result-count{font-size:12px;color:#888;margin-bottom:8px}
.actions{display:flex;gap:6px}
@media(max-width:600px){
  .tabs{padding:12px 12px 0}
  .content{margin:0 12px;padding:14px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="nav">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  <span class="nav-title">WMS Dashboard</span>
  <span class="nav-badge">Glass Warehouse</span>
  <div class="nav-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">📊 Overview</button>
  <button class="tab" onclick="showTab('add')">➕ Add Entry</button>
  <button class="tab" onclick="showTab('data')">📋 Data</button>
</div>

<div class="content">

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page active">
    <div class="metrics" id="metrics-row"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="section"><div class="section-title">Product type</div><div id="chart-product"></div></div>
      <div class="section"><div class="section-title">By shift</div><div id="chart-shift"></div></div>
    </div>
    <div class="section"><div class="section-title">Top customers</div><div id="chart-customers"></div></div>
  </div>

  <!-- ADD ENTRY -->
  <div id="page-add" class="page">
    <div id="alert-success" class="alert alert-success">✅ Entry added successfully!</div>
    <div id="alert-error" class="alert alert-error">❌ Error adding entry. Try again.</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Customer Name *</label>
        <input list="customers-list" id="f-customer" placeholder="Type or select customer..." />
        <datalist id="customers-list"></datalist>
      </div>
      <div class="form-group">
        <label>Product Type *</label>
        <select id="f-product">
          <option value="">Select...</option>
          <option>Double Glass</option>
          <option>Laminated Glass</option>
          <option>Single Glass</option>
          <option>Top Hung</option>
          <option>Single structure</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rack</label>
        <input id="f-rack" placeholder="e.g. 38" />
      </div>
      <div class="form-group">
        <label>Level</label>
        <select id="f-level">
          <option>L1</option><option>L2</option><option>L3</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bin</label>
        <input id="f-bin" placeholder="e.g. B01" value="B01" />
      </div>
      <div class="form-group">
        <label>Inventory (qty) *</label>
        <input id="f-inventory" type="number" min="1" placeholder="e.g. 10" />
      </div>
      <div class="form-group">
        <label>Shift *</label>
        <select id="f-shift">
          <option value="">Select...</option>
          <option>First shift</option>
          <option>Second shift</option>
          <option>Third shift</option>
        </select>
      </div>
      <div class="form-group">
        <label>User</label>
        <input list="users-list" id="f-user" placeholder="Type or select user..." />
        <datalist id="users-list"></datalist>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addEntry()">➕ Add Entry</button>
  </div>

  <!-- DATA TABLE -->
  <div id="page-data" class="page">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search customer, product, rack..." oninput="filterTable()" />
      <select id="filter-shift" onchange="filterTable()">
        <option value="">All shifts</option>
        <option>First shift</option><option>Second shift</option><option>Third shift</option>
      </select>
      <select id="filter-product" onchange="filterTable()">
        <option value="">All products</option>
        <option>Double Glass</option><option>Laminated Glass</option>
        <option>Single Glass</option><option>Top Hung</option><option>Single structure</option>
      </select>
    </div>
    <div class="result-count" id="result-count"></div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Customer</th><th>Rack</th><th>Level</th><th>Product</th><th>Qty</th><th>Shift</th><th>User</th><th>Action</th></tr></thead>
        <tbody id="data-table"></tbody>
      </table>
    </div>
  </div>

</div>

const PBADGE = {"Double Glass":"badge-dg","Laminated Glass":"badge-lg","Single Glass":"badge-sg","Top Hung":"badge-th","Single structure":"badge-ss"};

let allData = [];

async function init() {
  const dl = document.getElementById('customers-list');
  CUSTOMERS.forEach(c => { const o = document.createElement('option'); o.value = c; dl.appendChild(o); });
  const ul = document.getElementById('users-list');
  USERS.forEach(u => { const o = document.createElement('option'); o.value = u; ul.appendChild(o); });
  await loadData();
}

async function loadData() {
  try {
    const { data, error } = await supabase.from('wms_log').select('*').order('created_at', {ascending:false});
    if (error) throw error;
    if (data.length === 0) {
      await seedData();
      return loadData();
    }
    allData = data;
    setStatus(true);
    renderDashboard();
    renderTable(allData);
  } catch(e) {
    setStatus(false);
    allData = SEED_DATA;
    renderDashboard();
    renderTable(allData);
  }
}

async function seedData() {
  const chunks = [];
  for (let i = 0; i < SEED_DATA.length; i += 50) chunks.push(SEED_DATA.slice(i, i+50));
  for (const chunk of chunks) {
    await supabase.from('wms_log').insert(chunk);
  }
}

function setStatus(ok) {
  document.getElementById('status-dot').style.background = ok ? '#22c55e' : '#f59e0b';
  document.getElementById('status-text').textContent = ok ? 'Live' : 'Offline';
}

async function addEntry() {
  const customer = document.getElementById('f-customer').value.trim();
  const product = document.getElementById('f-product').value;
  const inventory = parseInt(document.getElementById('f-inventory').value);
  const shift = document.getElementById('f-shift').value;
  if (!customer || !product || !inventory || !shift) { alert('Please fill required fields (*)'); return; }
  const entry = {
    customer_name: customer, product_type: product,
    rack: document.getElementById('f-rack').value,
    level: document.getElementById('f-level').value,
    bin: document.getElementById('f-bin').value,
    inventory: inventory, shift: shift,
    user_name: document.getElementById('f-user').value,
    status: 'Delivered'
  };
  try {
    const { error } = await supabase.from('wms_log').insert([entry]);
    if (error) throw error;
    document.getElementById('alert-success').style.display = 'block';
    setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000);
    document.getElementById('f-customer').value = '';
    document.getElementById('f-inventory').value = '';
    await loadData();
  } catch(e) {
    document.getElementById('alert-error').style.display = 'block';
    setTimeout(() => document.getElementById('alert-error').style.display = 'none', 3000);
  }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  await supabase.from('wms_log').delete().eq('id', id);
  await loadData();
}

function renderDashboard() {
  const total = allData.reduce((s,r) => s + (r.inventory||0), 0);
  const customers = new Set(allData.map(r => r.customer_name)).size;
  const racks = new Set(allData.filter(r => r.rack && /^\d+$/.test(r.rack)).map(r => r.rack)).size;
  document.getElementById('metrics-row').innerHTML = [
    {l:'Total inventory', v: total.toLocaleString(), s:'units'},
    {l:'Customers', v: customers, s:'active'},
    {l:'Racks in use', v: racks, s:'positions'},
    {l:'Total entries', v: allData.length, s:'records'},
  ].map(m => `<div class="metric"><div class="metric-label">${m.l}</div><div class="metric-value">${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join('');

  const byProduct = {};
  allData.forEach(r => { byProduct[r.product_type] = (byProduct[r.product_type]||0) + (r.inventory||0); });
  const pColors = {'Double Glass':'#378ADD','Laminated Glass':'#22c55e','Single Glass':'#f59e0b','Top Hung':'#ec4899','Single structure':'#888'};
  barChart('chart-product', byProduct, pColors);

  const byShift = {};
  allData.forEach(r => { const s = (r.shift||'').trim(); byShift[s] = (byShift[s]||0) + (r.inventory||0); });
  barChart('chart-shift', byShift, {'First shift':'#378ADD','Second shift':'#22c55e','Third shift':'#f59e0b'});

  const byCust = {};
  allData.forEach(r => { byCust[r.customer_name] = (byCust[r.customer_name]||0) + (r.inventory||0); });
  const top10 = Object.fromEntries(Object.entries(byCust).sort((a,b) => b[1]-a[1]).slice(0,10));
  barChart('chart-customers', top10, null);
}

function barChart(id, data, colors) {
  const items = Object.entries(data).filter(([k]) => k && k!='null').sort((a,b) => b[1]-a[1]);
  const max = items[0]?.[1] || 1;
  document.getElementById(id).innerHTML = items.map(([label, val]) => {
    const pct = Math.round(val/max*100);
    const color = colors?.[label] || '#378ADD';
    const short = label.length > 16 ? label.slice(0,15)+'…' : label;
    return `<div class="bar-row"><div class="bar-label" title="${label}">${short}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${val}</div></div>`;
  }).join('');
}

function renderTable(data) {
  const count = document.getElementById('result-count');
  count.textContent = `${data.length} entries`;
  const tbody = document.getElementById('data-table');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:#aaa">No records found</td></tr>'; return; }
  tbody.innerHTML = data.slice(0,100).map(r => {
    const bc = PBADGE[r.product_type] || 'badge-ss';
    const shift = (r.shift||'').replace(' shift','').trim();
    const user = (r.user_name||'').split(' ').slice(0,2).join(' ');
    const delBtn = r.id ? `<button class="btn btn-danger btn-sm" onclick="deleteEntry('${r.id}')">🗑</button>` : '';
    return `<tr><td style="font-weight:500">${r.customer_name}</td><td>${r.rack||'—'}</td><td>${r.level||'—'}</td><td><span class="badge ${bc}">${r.product_type}</span></td><td style="font-weight:600">${r.inventory}</td><td>${shift}</td><td style="color:#888">${user}</td><td class="actions">${delBtn}</td></tr>`;
  }).join('');
  if (data.length > 100) tbody.innerHTML += `<tr><td colspan="8" style="text-align:center;color:#aaa;padding:10px;font-size:12px">Showing 100 of ${data.length}</td></tr>`;
}

function filterTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const shift = document.getElementById('filter-shift').value;
  const product = document.getElementById('filter-product').value;
  const filtered = allData.filter(r => {
    const mq = !q || (r.customer_name||'').toLowerCase().includes(q) || (r.product_type||'').toLowerCase().includes(q) || (r.rack||'').includes(q);
    const ms = !shift || (r.shift||'').includes(shift.replace(' shift','').trim());
    const mp = !product || r.product_type === product;
    return mq && ms && mp;
  });
  renderTable(filtered);
}

function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx = {dashboard:0,add:1,data:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

init();
</script>
</body>
</html>
