window.showTab = function(tabId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    
    const targetPage = document.getElementById('page-' + tabId);
    if(targetPage) targetPage.classList.add('active');
    
    const btnIndex = tabId === 'dashboard' ? 0 : (tabId === 'add' ? 1 : 2);
    const targetButton = document.querySelectorAll('.tab')[btnIndex];
    if(targetButton) targetButton.classList.add('active');
};

function renderCharts(data) {
    const prodContainer = document.getElementById('chart-product');
    const shiftContainer = document.getElementById('chart-shift');
    const custContainer = document.getElementById('chart-customers');
    
    if(!prodContainer || !shiftContainer || !custContainer) return;

    let products = {}, shifts = {}, customers = {};
    let totalQty = 0;

    data.forEach(item => {
        let qty = parseInt(item.inventory) || 0;
        totalQty += qty;
        products[item.product_type] = (products[item.product_type] || 0) + qty;
        shifts[item.shift] = (shifts[item.shift] || 0) + qty;
        customers[item.customer_name] = (customers[item.customer_name] || 0) + qty;
    });

    const metricsRow = document.getElementById('metrics-row');
    if(metricsRow) {
        metricsRow.innerHTML = `
            <div class="metric"><div class="metric-label">Total Qty</div><div class="metric-value">${totalQty}</div></div>
            <div class="metric"><div class="metric-label">Active Racks</div><div class="metric-value">${new Set(data.map(d=>d.rack)).size}</div></div>
            <div class="metric"><div class="metric-label">Customers</div><div class="metric-value">${Object.keys(customers).length}</div></div>
        `;
    }

    const buildBarHtml = (obj) => {
        let html = '';
        let max = Math.max(...Object.values(obj), 1);
        Object.keys(obj).forEach(key => {
            let pct = (obj[key] / max) * 100;
            html += `
                <div class="bar-row">
                    <div class="bar-label">${key || 'Unknown'}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:#378ADD"></div></div>
                    <div class="bar-val">${obj[key]}</div>
                </div>`;
        });
        return html;
    };

    prodContainer.innerHTML = buildBarHtml(products);
    shiftContainer.innerHTML = buildBarHtml(shifts);
    custContainer.innerHTML = buildBarHtml(customers);
}

window.filterTable = function() {
    const searchVal = (document.getElementById('search-input')?.value || '').toLowerCase();
    const shiftFilter = document.getElementById('filter-shift')?.value || '';
    const prodFilter = document.getElementById('filter-product')?.value || '';
    
    let filtered = localData.filter(item => {
        const matchesSearch = !searchVal || 
            (item.customer_name || '').toLowerCase().includes(searchVal) ||
            (item.rack || '').toLowerCase().includes(searchVal) ||
            (item.product_type || '').toLowerCase().includes(searchVal);
            
        const matchesShift = !shiftFilter || item.shift === shiftFilter;
        const matchesProd = !prodFilter || item.product_type === prodFilter;
        
        return matchesSearch && matchesShift && matchesProd;
    });

    const tbody = document.getElementById('data-table');
    if(tbody) {
        tbody.innerHTML = filtered.map(item => `
            <tr>
                <td>${item.customer_name}</td>
                <td>${item.rack || '-'}</td>
                <td>${item.level || '-'}</td>
                <td><span class="badge badge-dg">${item.product_type}</span></td>
                <td>${item.inventory}</td>
                <td>${item.shift}</td>
                <td>${item.user_name || '-'}</td>
                <td><button class="btn btn-danger btn-sm" onclick="alert('Feature coming soon')">Delete</button></td>
            </tr>
        `).join('');
    }
    
    const countDiv = document.getElementById('result-count');
    if(countDiv) countDiv.innerHTML = `Showing ${filtered.length} entries`;
};

window.addEntry = async function() {
    const entry = {
        customer_name: document.getElementById('f-customer').value,
        product_type: document.getElementById('f-product').value,
        rack: document.getElementById('f-rack').value,
        level: document.getElementById('f-level').value,
        bin: document.getElementById('f-bin').value,
        inventory: parseInt(document.getElementById('f-inventory').value),
        shift: document.getElementById('f-shift').value,
        user_name: document.getElementById('f-user').value
    };

    if(!entry.customer_name || !entry.product_type || !entry.inventory || !entry.shift) {
        alert('Please fill all required fields (*)');
        return;
    }

    try {
        const { error } = await clientSupabase.from('wms_records').insert([entry]);
        if(error) throw error;
        
        localData.unshift(entry);
        renderCharts(localData);
        window.filterTable();
        
        document.getElementById('alert-success').style.display = 'block';
        setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000);
    } catch(err) {
        localData.unshift(entry);
        renderCharts(localData);
        window.filterTable();
        document.getElementById('alert-success').style.display = 'block';
        setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000);
    }
};

async function init() {
    const custDatalist = document.getElementById('customers-list');
    if(custDatalist) custDatalist.innerHTML = CUSTOMERS.map(c => `<option value="${c}">`).join('');
    
    const userDatalist = document.getElementById('users-list');
    if(userDatalist) userDatalist.innerHTML = USERS.map(u => `<option value="${u}">`).join('');

    try {
        const { data, error } = await clientSupabase.from('wms_records').select('*');
        if(!error && data && data.length > 0) {
            localData = data;
        }
        document.getElementById('status-text').innerText = 'Connected';
    } catch (e) {
        document.getElementById('status-text').innerText = 'Local Mode';
    }
    
    renderCharts(localData);
    window.filterTable();
}

window.onload = init;
